name: Release MacOS & Android

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'androidApp/build.gradle.kts'
      - 'macosApp/macosApp.xcodeproj/project.pbxproj'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-15
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if Version Changed
        id: check_version
        run: |
          # 提取 Android 版本
          if [ -f "androidApp/build.gradle.kts" ]; then
            ANDROID_VERSION=$(grep 'versionName =' androidApp/build.gradle.kts | head -n 1 | awk -F'"' '{print $2}')
          else
            ANDROID_VERSION="unknown"
          fi

          # 提取 macOS 版本（主 App target 通常排在最前面）
          if [ -f "macosApp/macosApp.xcodeproj/project.pbxproj" ]; then
            MAC_VERSION=$(grep 'MARKETING_VERSION' macosApp/macosApp.xcodeproj/project.pbxproj | head -n 1 | awk -F'=' '{print $2}' | tr -d ' ;"')
          else
            MAC_VERSION="unknown"
          fi

          echo "Android Version: $ANDROID_VERSION"
          echo "macOS Version: $MAC_VERSION"

          TAG_NAME="v${MAC_VERSION}_${ANDROID_VERSION}"

          # 获取最近一个 release tag 中的各平台版本
          LATEST_TAG=$(git tag --sort=-v:refname | grep '^v[0-9]' | head -n 1)
          if [ -n "$LATEST_TAG" ]; then
            # 从 tag 中提取版本：v{mac}_{android} → mac 和 android
            LATEST_MAC=$(echo "$LATEST_TAG" | sed 's/^v//' | cut -d'_' -f1)
            LATEST_ANDROID=$(echo "$LATEST_TAG" | sed 's/^v//' | cut -d'_' -f2)
            echo "Latest tag: $LATEST_TAG (mac=$LATEST_MAC, android=$LATEST_ANDROID)"

            # 任一平台版本发生变化即触发
            MAC_CHANGED=false
            ANDROID_CHANGED=false
            [ "$MAC_VERSION" != "$LATEST_MAC" ] && MAC_CHANGED=true
            [ "$ANDROID_VERSION" != "$LATEST_ANDROID" ] && ANDROID_CHANGED=true

            if [ "$MAC_CHANGED" = false ] && [ "$ANDROID_CHANGED" = false ]; then
              echo "两个平台版本均未变化，跳过。"
              echo "changed=false" >> $GITHUB_OUTPUT
              exit 0
            fi

            echo "检测到版本变化: macOS=$MAC_CHANGED, Android=$ANDROID_CHANGED"
          else
            echo "没有历史 tag，将创建首个 release"
          fi

          echo "changed=true" >> $GITHUB_OUTPUT
          echo "tag=$TAG_NAME" >> $GITHUB_OUTPUT

      - name: Generate Changelog
        if: steps.check_version.outputs.changed == 'true'
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          if [ -z "$PREV_TAG" ]; then
            LOGS=$(git log --no-merges --pretty=format:"- %s")
          else
            LOGS=$(git log $PREV_TAG..HEAD --no-merges --pretty=format:"- %s")
          fi

          echo "### 更新内容" > changelog.txt
          echo "$LOGS" >> changelog.txt
          cat changelog.txt

      - name: Setup Java
        if: steps.check_version.outputs.changed == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Decode Android Keystore
        if: steps.check_version.outputs.changed == 'true'
        env:
          ENCODED_KEYSTORE: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo $ENCODED_KEYSTORE | base64 -d > $RUNNER_TEMP/keystore.jks

      - name: Build Android APK
        if: steps.check_version.outputs.changed == 'true'
        env:
          KEYSTORE_FILE_PATH: ${{ runner.temp }}/keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew
          ./gradlew --no-daemon :androidApp:assembleRelease

          APK_DIR="androidApp/build/outputs/apk/release"
          find $APK_DIR -name "*.apk" -print0 | while IFS= read -r -d '' file; do
            mv "$file" "$APK_DIR/我爱上班-Android-${{ steps.check_version.outputs.tag }}.apk"
          done

      - name: Import macOS Signing Certificate
        if: steps.check_version.outputs.changed == 'true'
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
        run: |
          # 创建临时钥匙串
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PWD=$(openssl rand -hex 16)
          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"

          # 导入证书
          CERT_PATH=$RUNNER_TEMP/certificate.p12
          echo "$MACOS_CERTIFICATE" | base64 --decode > "$CERT_PATH"
          security import "$CERT_PATH" -P "$MACOS_CERTIFICATE_PWD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

          # 获取签名身份
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep "Apple Development" | head -1 | awk -F'"' '{print $2}')
          echo "SIGNING_IDENTITY=$IDENTITY" >> $GITHUB_ENV
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV
          echo "KEYCHAIN_PWD=$KEYCHAIN_PWD" >> $GITHUB_ENV
          echo "使用签名身份: $IDENTITY"

      - name: Build macOS App & Package DMG
        if: steps.check_version.outputs.changed == 'true'
        run: |
          cd macosApp

          # 选择签名方式：优先使用开发者证书，没有则用 ad-hoc
          if [ -n "$SIGNING_IDENTITY" ]; then
            echo "使用开发者证书签名: $SIGNING_IDENTITY"
            SIGN_ARGS="CODE_SIGN_IDENTITY=\"$SIGNING_IDENTITY\" CODE_SIGNING_REQUIRED=YES OTHER_CODE_FLAGS=--keychain=\"$KEYCHAIN_PATH\""
          else
            echo "未配置签名证书，使用 ad-hoc 签名"
            SIGN_ARGS="CODE_SIGN_IDENTITY=\"-\" CODE_SIGNING_REQUIRED=YES"
          fi

          # 使用最新可用的 Xcode
          LATEST_XCODE=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          if [ -n "$LATEST_XCODE" ]; then
            sudo xcode-select -s "$LATEST_XCODE"
            echo "使用 Xcode: $LATEST_XCODE"
          fi

          eval xcodebuild clean build -project macosApp.xcodeproj -scheme macosApp -configuration Release $SIGN_ARGS -derivedDataPath derived_data

          # 找到构建好的 .app 文件
          APP_PATH=$(find derived_data/Build/Products/Release -name "*.app" | head -n 1)
          APP_NAME=$(basename "$APP_PATH" .app)

          echo "Found app at: $APP_PATH"

          # 制作 DMG
          hdiutil create -volname "$APP_NAME" -srcfolder "$APP_PATH" -ov -format UDZO "../我爱上班-macOS-${{ steps.check_version.outputs.tag }}.dmg"

      - name: Cleanup Keychain
        if: always()
        run: |
          if [ -n "$KEYCHAIN_PATH" ] && [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          fi

      - name: Publish GitHub Release
        if: steps.check_version.outputs.changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.check_version.outputs.tag }}
          name: 我爱上班 ${{ steps.check_version.outputs.tag }}
          body_path: changelog.txt
          files: |
            androidApp/build/outputs/apk/release/我爱上班-Android-*.apk
            我爱上班-macOS-*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
